{% extends 'blog/base.html' %}

{% block content %}
    <h2>Blog entries: </h2>

    {% for post in posts %} 
    <div class="posts">
        <p>{{post.published_date}}</p>
        <h2><a href="">{{ post.title }}</a></h2>
        <p>{{ post.text | linebreaksbr }}</p>
    </div>
    {% endfor %}
{% endblock %}
