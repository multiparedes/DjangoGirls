{% load static %}
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Multiparedes' blog</title>
    <link rel="stylesheet" href="{% static 'css/blog.css' %}">
</head>
<body class="w-screen">
    <div class="header" >
        <a href="/">Wellcome to Multiparedes' blog</a>
    </div>
    <main>
        <h2>Blog entries: </h2>

        {% for post in posts %} 
        <div class="posts">
            <p>{{post.published_date}}</p>
            <h2><a href="">{{ post.title }}</a></h2>
            <p>{{ post.text | linebreaksbr }}</p>
        </div>
        {% endfor %}
    </main>

</body>
</html>
